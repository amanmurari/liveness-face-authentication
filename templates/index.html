<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceGuard — Liveness Detection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg:       #07090f;
    --surface:  #0d1117;
    --border:   #1e2634;
    --accent:   #6366f1;
    --accent2:  #8b5cf6;
    --green:    #10b981;
    --red:      #ef4444;
    --amber:    #f59e0b;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --glow:     rgba(99,102,241,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 48px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.12) 0%, transparent 70%);
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 24px var(--glow);
  }
  .logo-text {
    font-size: 1.7rem;
    font-weight: 700;
    background: linear-gradient(90deg, #a5b4fc, #c4b5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── Layout ── */
  .container {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 1060px;
  }

  /* ── Cards ── */
  .card {
    flex: 1;
    min-width: 320px;
    max-width: 500px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
    transition: border-color 0.3s;
  }
  .card:hover { border-color: rgba(99,102,241,0.4); }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(99,102,241,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .card:nth-child(2) { animation-delay: 0.1s; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .card-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: #c7d2fe;
    letter-spacing: 0.02em;
  }

  /* ── Video ── */
  .video-wrap {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 4/3;
    border: 1px solid var(--border);
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }
  canvas { display: none; }
  .video-badge {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--green);
    display: flex; align-items: center; gap: 5px;
  }
  .dot-live {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse-dot 1.4s ease infinite;
  }

  /* ── Inputs ── */
  .input-wrap { position: relative; margin: 16px 0 10px; }
  input[type=text] {
    width: 100%;
    padding: 11px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type=text]::placeholder { color: var(--muted); }
  input[type=text]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
  }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 10px; margin-top: 10px; }
  button {
    flex: 1;
    padding: 11px 16px;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    position: relative;
    overflow: hidden;
  }
  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }
  button:hover:not(:disabled)::after { background: rgba(255,255,255,0.07); }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-ghost {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 4px 18px rgba(99,102,241,0.35);
  }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(99,102,241,0.5); }
  .btn-success {
    background: linear-gradient(135deg, #059669, var(--green));
    color: #fff;
    box-shadow: 0 4px 18px rgba(16,185,129,0.3);
  }
  .btn-success:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(16,185,129,0.45); }
  .btn-danger {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.25);
    color: #fca5a5;
  }

  /* ── Status message ── */
  .status-msg {
    margin-top: 10px;
    font-size: 0.82rem;
    min-height: 20px;
    color: var(--muted);
    transition: color 0.3s;
    text-align: center;
  }
  .status-msg.ok  { color: var(--green); }
  .status-msg.err { color: var(--red); }

  /* ── Snapshot preview ── */
  .preview-wrap { margin-top: 12px; display: none; }
  .preview-wrap img {
    width: 100%;
    border-radius: 10px;
    border: 1px solid var(--border);
    animation: fadeIn 0.4s ease;
  }

  /* ── Challenge box ── */
  .challenge-area { margin: 16px 0 12px; }
  #challenge-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--muted);
    min-height: 68px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s;
  }
  #challenge-box.idle {
    color: var(--muted);
  }
  #challenge-box.active {
    color: #a5b4fc;
    border-color: rgba(99,102,241,0.4);
    background: rgba(99,102,241,0.07);
    box-shadow: 0 0 24px rgba(99,102,241,0.12);
    animation: bounce-in 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  #challenge-box.pass {
    color: var(--green);
    border-color: rgba(16,185,129,0.4);
    background: rgba(16,185,129,0.08);
    box-shadow: 0 0 24px rgba(16,185,129,0.15);
  }
  #challenge-box.fail {
    color: var(--red);
    border-color: rgba(239,68,68,0.35);
    background: rgba(239,68,68,0.07);
    animation: shake 0.4s ease;
  }

  /* ── Progress ── */
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 8px rgba(99,102,241,0.6);
  }

  /* ── Sub-status ── */
  #status-msg {
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
    min-height: 18px;
    margin-bottom: 12px;
    transition: color 0.3s;
  }
  #status-msg.pass { color: var(--green); }
  #status-msg.fail { color: var(--amber); }

  /* ── Result overlay ── */
  #result-box {
    display: none;
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    margin-bottom: 14px;
    animation: fadeIn 0.5s ease;
  }
  #result-box.success {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
  }
  #result-box.failure {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
  }
  .result-icon { font-size: 2rem; margin-bottom: 6px; }
  .result-label { font-size: 1rem; font-weight: 600; }
  .result-sub { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity:0; transform: translateY(-18px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(22px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity:0; } to { opacity:1; }
  }
  @keyframes bounce-in {
    from { transform: scale(0.92); opacity:0.6; }
    to   { transform: scale(1);    opacity:1; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    40%      { transform: translateX(6px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }
  @keyframes pulse-dot {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(0.7); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <span class="logo-text">FaceGuard</span>
  </div>
  <p class="subtitle">AI-Powered Liveness Detection</p>
</header>

<div class="container">

  <!-- ── Register Card ── -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">👤</div>
      <span class="card-title">Register Face</span>
    </div>

    <div class="video-wrap">
      <video id="reg-video" autoplay playsinline></video>
      <canvas id="reg-canvas"></canvas>
      <div class="video-badge"><span class="dot-live"></span>LIVE</div>
    </div>

    <div class="preview-wrap" id="preview-wrap">
      <img id="reg-preview" alt="snapshot">
    </div>

    <div class="input-wrap">
      <input type="text" id="reg-name" placeholder="Enter your name…">
    </div>

    <div class="btn-row">
      <button class="btn-ghost" onclick="captureSnapshot()">📷 Capture</button>
      <button class="btn-primary" id="reg-btn" onclick="register()" disabled>Register</button>
    </div>

    <p class="status-msg" id="reg-status"></p>
  </div>

  <!-- ── Verify Card ── -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🔍</div>
      <span class="card-title">Liveness Verification</span>
    </div>

    <div class="video-wrap">
      <video id="verify-video" autoplay playsinline></video>
      <canvas id="verify-canvas"></canvas>
      <div class="video-badge"><span class="dot-live"></span>LIVE</div>
    </div>

    <div class="challenge-area">
      <div id="challenge-box" class="idle">Press Start to begin</div>
    </div>

    <div class="progress-header">
      <span>Progress</span>
      <span id="progress-label">0 / 6</span>
    </div>
    <div class="progress-track"><div id="progress-bar"></div></div>

    <p id="status-msg"></p>

    <div id="result-box">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-label" id="result-label"></div>
      <div class="result-sub" id="result-sub"></div>
    </div>

    <div class="btn-row">
      <button class="btn-success" id="start-btn" onclick="startSession()">▶ Start</button>
      <button class="btn-danger"  id="stop-btn"  onclick="stopSession()" disabled>■ Stop</button>
    </div>
  </div>

</div>

<script>
let sessionId = null;
let frameInterval = null;
let snapshotBlob = null;

async function startCameras() {
  const constraints = { video: { width: 640, height: 480, facingMode: 'user' } };
  try {
    const s1 = await navigator.mediaDevices.getUserMedia(constraints);
    document.getElementById('reg-video').srcObject = s1;
    const s2 = await navigator.mediaDevices.getUserMedia(constraints);
    document.getElementById('verify-video').srcObject = s2;
  } catch(e) {
    setStatus('reg-status', '⚠ Camera access denied', 'err');
  }
}

function flipDraw(canvas, video) {
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0);
  ctx.restore();
}

function setStatus(id, text, cls = '') {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'status-msg ' + cls;
}

// ── Register ──────────────────────────────────────────
function captureSnapshot() {
  const video  = document.getElementById('reg-video');
  const canvas = document.getElementById('reg-canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  flipDraw(canvas, video);

  snapshotBlob = canvas.toDataURL('image/jpeg', 0.9);
  const preview = document.getElementById('reg-preview');
  preview.src   = snapshotBlob;
  document.getElementById('preview-wrap').style.display = 'block';
  document.getElementById('reg-btn').disabled = false;
  setStatus('reg-status', 'Photo captured — ready to register', '');
}

async function register() {
  const name = document.getElementById('reg-name').value.trim();
  if (!name)         { setStatus('reg-status', 'Please enter your name.', 'err'); return; }
  if (!snapshotBlob) { setStatus('reg-status', 'Capture a photo first.', 'err'); return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Registering…';

  const res  = await fetch('/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, image: snapshotBlob }),
  });
  const data = await res.json();

  btn.innerHTML = 'Register';
  btn.disabled  = false;

  if (data.success) {
    setStatus('reg-status', `✓ "${name}" registered!`, 'ok');
    snapshotBlob = null;
    document.getElementById('reg-name').value = '';
    document.getElementById('preview-wrap').style.display = 'none';
    btn.disabled = true;
  } else {
    setStatus('reg-status', data.error || 'Registration failed.', 'err');
  }
}

// ── Verify ────────────────────────────────────────────
async function startSession() {
  stopSession(true);

  document.getElementById('result-box').style.display = 'none';
  document.getElementById('start-btn').disabled = true;
  document.getElementById('stop-btn').disabled  = false;
  document.getElementById('status-msg').textContent = '';

  const res  = await fetch('/api/session/start', { method: 'POST' });
  const data = await res.json();
  sessionId  = data.session_id;

  setChallengeBox(data.challenge, 'active');
  updateProgress(data.progress, data.total_challenges);

  frameInterval = setInterval(sendFrame, 200);
}

function stopSession(silent = false) {
  clearInterval(frameInterval);
  frameInterval = null;
  sessionId     = null;
  document.getElementById('start-btn').disabled = false;
  document.getElementById('stop-btn').disabled  = true;
  if (!silent) {
    setChallengeBox('Press Start to begin', 'idle');
    updateProgress(0, 6);
    document.getElementById('status-msg').textContent = '';
    document.getElementById('status-msg').className = '';
  }
}

async function sendFrame() {
  if (!sessionId) return;
  const video  = document.getElementById('verify-video');
  const canvas = document.getElementById('verify-canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  flipDraw(canvas, video);
  const frame = canvas.toDataURL('image/jpeg', 0.7);

  let data;
  try {
    const res = await fetch('/api/session/frame', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, frame }),
    });
    data = await res.json();
  } catch(e) { return; }

  if (data.done) {
    clearInterval(frameInterval);
    frameInterval = null;
    document.getElementById('start-btn').disabled = false;
    document.getElementById('stop-btn').disabled  = true;
    showResult(data.success, data.name);
    return;
  }

  const msg = document.getElementById('status-msg');
  if (data.status === 'challenge_passed') {
    setChallengeBox(data.challenge, 'active');
    msg.textContent = '✓ Challenge passed!';
    msg.className   = 'pass';
  } else if (data.status === 'pass') {
    setChallengeBox(data.challenge, 'pass');
    msg.textContent = 'Hold it…';
    msg.className   = 'pass';
  } else {
    setChallengeBox(data.challenge, 'fail');
    msg.textContent = 'Keep trying…';
    msg.className   = 'fail';
  }
  updateProgress(data.progress, data.total_challenges);
}

function setChallengeBox(text, cls) {
  const box = document.getElementById('challenge-box');
  // force re-trigger animation on active class
  box.className = '';
  void box.offsetWidth;
  box.className = cls;
  box.textContent = text.toUpperCase();
}

function updateProgress(done, total) {
  document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total}`;
}

function showResult(success, name) {
  const box   = document.getElementById('result-box');
  const icon  = document.getElementById('result-icon');
  const label = document.getElementById('result-label');
  const sub   = document.getElementById('result-sub');

  box.style.display = 'block';
  if (success) {
    box.className   = 'success';
    icon.textContent  = '✅';
    label.textContent = name ? `Welcome, ${name}!` : 'Liveness Confirmed';
    sub.textContent   = name ? 'Identity verified successfully.' : 'Face not found in database.';
    setChallengeBox('VERIFIED', 'pass');
    updateProgress(6, 6);
  } else {
    box.className   = 'failure';
    icon.textContent  = '❌';
    label.textContent = 'Verification Failed';
    sub.textContent   = 'Could not confirm liveness. Please try again.';
    setChallengeBox('FAILED', 'fail');
  }
}

startCameras();
</script>
</body>
</html>
